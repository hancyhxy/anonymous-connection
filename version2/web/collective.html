<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>collective wall — anonymous avatar</title>
  <link rel="stylesheet" href="collective.css">
</head>
<body>
  <main id="stage" aria-label="Collective avatar wall">
    <!-- avatar tiles inserted by collective.js, absolutely positioned. -->
  </main>

  <!-- Join-QR modal — center-anchored full-screen overlay toggled by the
       panel's "show join QR" button. QR encodes the bare stage-1 URL
       (no ?sticker=N), so anyone scanning it adds a wall-only tile
       without overlaying any physical board's slot. Three independent
       dismiss paths: × button, backdrop click, ESC key. -->
  <div id="qr-overlay" class="qr-overlay" hidden>
    <div class="qr-card-large">
      <button type="button" id="qr-close" class="qr-close" aria-label="close">×</button>
      <img src="/api/qr" alt="Scan to join" class="qr-img-large">
      <div class="qr-caption-large">scan to join</div>
    </div>
  </div>

  <!-- Bottom-corner counter + similarity hint. Each viewer has their own
       physical sticker QR, so the wall-side scan-to-join overlay is gone;
       this row is now the only persistent UI element besides the tiles.
       The hint clues the audience in on what the spatial layout means
       (force-directed similarity), since mood/interest are no longer
       surfaced as legends. -->
  <div id="status-pill" class="status-pill">
    <span id="count">0</span> profiles
    <span class="status-sep" aria-hidden="true">·</span>
    <span class="status-hint">the closer they are, the more they have in common</span>
  </div>

  <!-- Live layout + mock tuner. Panel.collapsed via header button. State
       persists in localStorage so it stays the way you left it across
       reloads. Two sections: Layout (force-directed tuning) and Mock
       (filler-data control). -->
  <aside id="debug-panel" aria-label="Demo control panel">
    <header class="debug-header">
      <span class="debug-title">controls</span>
      <button type="button" id="debug-toggle" aria-label="collapse">▾</button>
    </header>
    <div class="debug-body">

      <!-- ─── Section: Layout ───────────────────────────── -->
      <div class="debug-section-title">Layout</div>

      <label class="debug-row">
        <span class="debug-label">tile size</span>
        <input type="range" id="t-tileSize" min="60" max="220" step="2">
        <span class="debug-value" id="v-tileSize">110</span>
      </label>
      <div class="debug-hint">size of each avatar tile</div>

      <label class="debug-row">
        <span class="debug-label">collision pad</span>
        <input type="range" id="t-collisionPad" min="-100" max="120" step="2">
        <span class="debug-value" id="v-collisionPad">6</span>
      </label>
      <div class="debug-hint">how close two tiles can get</div>

      <label class="debug-row">
        <span class="debug-label">rest base</span>
        <input type="range" id="t-restBase" min="120" max="700" step="10">
        <span class="debug-value" id="v-restBase">360</span>
      </label>
      <div class="debug-hint">distance between them</div>

      <label class="debug-row">
        <span class="debug-label">score weight</span>
        <input type="range" id="t-scoreK" min="0.05" max="1.5" step="0.05">
        <span class="debug-value" id="v-scoreK">0.35</span>
      </label>
      <div class="debug-hint">how strongly similarity pulls them together</div>

      <button type="button" id="debug-reset" class="debug-reset">reset to defaults</button>

      <!-- ─── Section: Mock ─────────────────────────────────────
           Three submission channels, three rows. Each row pairs a
           show/hide checkbox with a per-channel clear button so the
           operator can mute or wipe each source independently:
             Hardware  — physical sticker scans (?sticker=1..5)
             Scanned   — join-QR scans on the wall (no sticker)
             Mock      — seed-mock button below
           A `clear all` at the bottom wipes the lot. -->
      <div class="debug-section-title">Mock</div>

      <div class="channel-row">
        <label class="channel-label">
          <input type="checkbox" id="t-showHardware" checked>
          <span>Hardware</span>
        </label>
        <button type="button" id="debug-clear-hardware" class="channel-clear">clear</button>
      </div>

      <div class="channel-row">
        <label class="channel-label">
          <input type="checkbox" id="t-showScanned" checked>
          <span>Scanned</span>
        </label>
        <button type="button" id="debug-clear-scanned" class="channel-clear">clear</button>
      </div>

      <div class="channel-row">
        <label class="channel-label">
          <input type="checkbox" id="t-showMock" checked>
          <span>Mock</span>
        </label>
        <button type="button" id="debug-clear-mock" class="channel-clear">clear</button>
      </div>

      <button type="button" id="debug-clear-data" class="debug-clear">clear all profiles</button>

      <label class="debug-row">
        <span class="debug-label">mock count</span>
        <input type="number" id="t-mockCount" min="1" max="100" step="1" value="25" class="debug-number">
      </label>
      <div class="debug-hint">how many synthetic tiles to inject</div>

      <button type="button" id="debug-seed-mock" class="debug-seed">seed mock</button>

      <button type="button" id="debug-show-qr" class="debug-show-qr">show join QR</button>

    </div>
  </aside>

  <script type="module" src="collective.js"></script>
</body>
</html>
