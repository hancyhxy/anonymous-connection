<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage 3 — tap to connect</title>
  <style>
    /*
      Stage 3 debug page — Block 2 of the rollout.

      Goal: prove the server-side match flow works end-to-end (tap → score
      → hint → SSE push) BEFORE wiring up the ESP32 firmware. This page
      simulates "I am user X, I just tapped user Y" via buttons. Once
      Block 3 lands, the buttons get replaced by real Web Serial events
      from the device.

      Visual style intentionally minimal — this is a debug surface, not
      the final UX. Real animation lives in the device firmware (per the
      "animation on device, hint in browser" decision).
    */
    :root {
      --bg:      #1a1a1e;
      --fg:      #e8e8ec;
      --dim:     #6a6a72;
      --accent:  #7bd1ff;
      --good:    #7be0a0;
      --warn:    #e8c878;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px; min-height: 100vh; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; }
    h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; margin: 0 0 4px; }
    .sub { color: var(--dim); margin: 0 0 24px; font-size: 13px; }

    section { border: 1px solid #2a2a32; border-radius: 8px;
      padding: 16px 18px; margin-bottom: 16px; background: #1f1f25; }
    section h2 { font-size: 13px; font-weight: 600; margin: 0 0 12px;
      color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; }

    /* "I am" picker — radio-styled buttons */
    .me-picker { display: flex; flex-wrap: wrap; gap: 8px; }
    .me-picker label { display: inline-flex; align-items: center;
      padding: 6px 12px; border: 1px solid #3a3a42; border-radius: 6px;
      cursor: pointer; user-select: none; }
    .me-picker label.active { border-color: var(--accent);
      background: rgba(123, 209, 255, 0.08); color: var(--accent); }
    .me-picker input { display: none; }

    /* Tap targets — one button per other sticker */
    .tap-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .tap-btn { background: #2a2a32; border: 1px solid #3a3a42; color: var(--fg);
      padding: 12px 14px; border-radius: 6px; cursor: pointer;
      font-family: inherit; font-size: 13px; text-align: left; }
    .tap-btn:hover { border-color: var(--accent); }
    .tap-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .tap-btn .uid { color: var(--dim); font-size: 11px; display: block; margin-top: 2px; }

    /* Match result panel — score + hint + meta */
    #match { min-height: 120px; }
    #match.empty { color: var(--dim); font-style: italic; }
    .match-header { display: flex; align-items: baseline; gap: 16px;
      margin-bottom: 10px; }
    .score { font-size: 36px; font-weight: 700; color: var(--good);
      letter-spacing: -0.02em; }
    .score.zero { color: var(--warn); }
    .meta { color: var(--dim); font-size: 12px; }
    .hint { font-size: 16px; line-height: 1.4; padding: 12px;
      background: #161618; border-left: 3px solid var(--accent);
      border-radius: 4px; margin-top: 10px; }
    .common { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .common .tag { padding: 2px 8px; background: rgba(123, 209, 255, 0.12);
      color: var(--accent); border-radius: 3px; font-size: 11px; }

    /* Activity log — append-only scroll, useful while debugging */
    #log { font-size: 11px; line-height: 1.5; color: var(--dim);
      max-height: 220px; overflow-y: auto; }
    #log .entry { padding: 2px 0; border-bottom: 1px dotted #2a2a32; }
    #log .entry.err { color: #e87b7b; }
    #log .entry .t { color: #4a4a52; margin-right: 8px; }

    .conn { display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; vertical-align: middle; margin-left: 8px; }
    .conn.on  { background: rgba(123, 224, 160, 0.15); color: var(--good); }
    .conn.off { background: rgba(232, 123, 123, 0.15); color: #e87b7b; }

    /* Device connect bar — borrowed style from index.html status bar so
       the visual language stays consistent across pages. */
    .device-bar { display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #16161a; border: 1px solid #2a2a32;
      border-radius: 8px; margin-bottom: 16px; font-size: 12px; }
    #btn-connect { padding: 6px 12px; background: #2a2a32; color: var(--fg);
      border: 1px solid #3a3a42; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 12px; }
    #btn-connect:hover { border-color: var(--accent); }
    #btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }
    #status-text { color: var(--dim); }
    #status-text.ok  { color: var(--good); }
    #status-text.err { color: #e87b7b; }
  </style>
</head>
<body>
  <div class="wrap">

    <h1>stage 3 · tap to connect <span id="conn" class="conn off">SSE off</span></h1>
    <p class="sub">debug page (Block 2 + 3). browser bridges SSE → device serial.</p>

    <!-- Device connect bar — Web Serial requires a user gesture, so a manual
         click is unavoidable. Once connected, every match event from /events_stage3
         is auto-forwarded to the device as a JSON line over USB serial. -->
    <div class="device-bar">
      <button id="btn-connect" type="button">Connect Device</button>
      <span id="status-text">device not connected</span>
    </div>

    <!-- Who am I — pick one of the 5 hardcoded fixture users -->
    <section>
      <h2>i am</h2>
      <div class="me-picker" id="me-picker">
        <!-- populated by JS from /api/stage3/users -->
      </div>
    </section>

    <!-- Tap targets — clicking simulates "device reads peer's NFC sticker" -->
    <section>
      <h2>tap a sticker</h2>
      <div class="tap-grid" id="tap-grid">
        <!-- populated by JS, 1 button per non-self user -->
      </div>
    </section>

    <!-- Match result — what the device + browser will display in real flow -->
    <section>
      <h2>last match</h2>
      <div id="match" class="empty">no taps yet — pick "i am" and tap a sticker above.</div>
    </section>

    <!-- Append-only debug log -->
    <section>
      <h2>log</h2>
      <div id="log"></div>
    </section>
  </div>

  <script type="module">
    /*
      Stage 3 client logic — four responsibilities:
      1. Load fixture users from /api/stage3/users, render "I am" + tap buttons.
      2. POST /api/tap when a tap button clicks.
      3. Listen on /events_stage3 SSE for match events, render result panel.
      4. Forward each match payload over Web Serial to the device, prefixed
         with type:"match" so firmware's handleMatch() knows it's not an
         avatar-state update.

      Web Serial code is reused from device.js (the same module index.html
      uses for stage 1). Since it's an ES module we just import the bits we
      need — connect lifecycle + sendState — and benefit from any future
      hardening done there.
    */
    import { connectUI, sendState } from "./device.js";

    const $  = (id) => document.getElementById(id);
    const fmtTime = () => new Date().toTimeString().slice(0, 8);

    let users  = [];     // loaded from /api/stage3/users
    let meUid  = null;   // currently selected "I am" UID

    function log(msg, isErr = false) {
      const el = document.createElement("div");
      el.className = "entry" + (isErr ? " err" : "");
      el.innerHTML = `<span class="t">${fmtTime()}</span>${msg}`;
      $("log").prepend(el);
    }

    async function loadUsers() {
      const r = await fetch("/api/stage3/users");
      if (!r.ok) throw new Error("failed to load fixture");
      users = await r.json();
      log(`fixture loaded — ${users.length} users`);
      renderMePicker();
      renderTapGrid();
    }

    function renderMePicker() {
      const host = $("me-picker");
      host.innerHTML = "";
      for (const u of users) {
        const lbl = document.createElement("label");
        lbl.innerHTML = `<input type="radio" name="me" value="${u.uid}">
                         ${u.label} · ${u.user_id}`;
        lbl.querySelector("input").addEventListener("change", () => {
          meUid = u.uid;
          for (const l of host.querySelectorAll("label")) l.classList.remove("active");
          lbl.classList.add("active");
          renderTapGrid();
          log(`i am now <b>${u.label}</b> (${u.user_id}) — interests: ${u.interests.join(", ")}`);
          // Seed device with me's avatar so st.valid flips true. Without this
          // the firmware sits on the "waiting for connection" screen between
          // matches; that branch is a synchronous SPI repaint that has bitten
          // us with USB-CDC RX FIFO drops when the next match packet arrives
          // mid-render. Seeding ahead of time keeps renderFull on the main
          // (drain-protected) path and gives the demo a continuous visual:
          // me avatar → match anim → back to me avatar.
          //
          // Interests: server gives us a flat string array (e.g. ["music",
          // "film", "art"]); firmware expects [{icon, label}] objects (see
          // handleLine in serial_avatar.ino — it iterates JsonObjects and
          // reads tag["icon"] / tag["label"]). Map flat → object shape here.
          // icon left empty for now (no glyph mapping yet); firmware accepts
          // empty icon as long as label has content.
          //
          // The earlier "race" that made us turn this off (commit history)
          // was almost certainly schema mismatch: passing flat strings into
          // the {icon,label} loop gave interest_count=0 silently. Now that
          // the shape is correct, this should be safe.
          //
          // Packet size estimate: ~186 B (was 106 B). Comfortably under
          // 2 KB RX FIFO, 1 KB lineBuf ceiling, 1 KB StaticJsonDocument cap.
          sendState({
            sex:    u.avatar.sex,
            color:  u.avatar.color,
            num:    u.avatar.num,
            smile:  u.avatar.smile,
            mood:   u.avatar.mood,
            energy: u.avatar.bg_level,    // wire field rename, mirrors app.js
            quote:  u.quote,
            interests: u.interests.map(label => ({ icon: "", label })),
          });
        });
        host.appendChild(lbl);
      }
    }

    function renderTapGrid() {
      const host = $("tap-grid");
      host.innerHTML = "";
      for (const u of users) {
        const btn = document.createElement("button");
        btn.className = "tap-btn";
        btn.disabled = !meUid || u.uid === meUid;
        btn.innerHTML = `tap <b>${u.label}</b> · ${u.user_id}
                         <span class="uid">${u.uid}</span>`;
        btn.addEventListener("click", () => doTap(u.uid));
        host.appendChild(btn);
      }
    }

    async function doTap(peerUid) {
      if (!meUid) return;
      log(`tap → me=${meUid.slice(-5)} peer=${peerUid.slice(-5)}`);
      const r = await fetch("/api/tap", {
        method:  "POST",
        headers: {"Content-Type": "application/json"},
        body:    JSON.stringify({me_uid: meUid, peer_uid: peerUid}),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        log(`tap failed: ${err.error || r.status}`, true);
      }
      // success path lands via the SSE 'match' event handler; we don't render
      // the result from this fetch's response, so the device + this browser
      // see the same payload from the same source of truth.
    }

    function forwardMatchToDevice(m) {
      // Tag with type:"match" so firmware's handleLine() routes it to
      // handleMatch() instead of the legacy avatar-state path. We pass
      // the full payload (peer_avatar + common + hint + score) through
      // — firmware decides which fields it actually uses. sendState
      // is a no-op silently when no device is connected, so this is
      // safe to call unconditionally on every match.
      sendState({ type: "match", ...m });
    }

    function renderMatch(m) {
      forwardMatchToDevice(m);
      const isZero = m.score === 0;
      const commonTags = m.common.length
        ? `<div class="common">${m.common.map(c => `<span class="tag">${c}</span>`).join("")}</div>`
        : `<div class="common"><span class="tag" style="color:var(--warn);background:rgba(232,200,120,0.12)">no overlap</span></div>`;
      $("match").className = "";
      $("match").innerHTML = `
        <div class="match-header">
          <span class="score ${isZero ? "zero" : ""}">${m.score}%</span>
          <span class="meta">${m.me_user_id} → ${m.peer_user_id} (${m.peer_label})</span>
        </div>
        ${commonTags}
        <div class="hint">${m.hint}</div>
      `;
      log(`match · ${m.score}% · common=[${m.common.join(",")}] · hint="${m.hint}"`);
    }

    // Bridge real NFC taps from the device into the existing button path.
    // Firmware emits {"type":"tap","uid":"..."} when PN532 reads a sticker;
    // device.js's startReadLoop already turns JSON-shaped Serial lines into
    // `device:message` window events, so we just listen and route to doTap —
    // the same function the on-screen tap buttons call. Keeps NFC and click
    // paths converging at /api/tap, no duplicate logic.
    function connectDeviceMessages() {
      window.addEventListener("device:message", (ev) => {
        const m = ev.detail;
        if (!m || m.type !== "tap" || !m.uid) return;
        if (!meUid) {
          log(`tap UID=${m.uid.slice(-5)} ignored — pick "i am" first`, true);
          return;
        }
        if (m.uid === meUid) {
          log(`tap UID=${m.uid.slice(-5)} ignored (self-tap)`);
          return;
        }
        log(`device → tap UID=${m.uid.slice(-5)}`);
        doTap(m.uid);
      });
    }

    function connectSSE() {
      const es = new EventSource("/events_stage3");
      es.addEventListener("open", () => {
        $("conn").className = "conn on";
        $("conn").textContent = "SSE on";
        log("SSE connected");
      });
      es.addEventListener("error", () => {
        $("conn").className = "conn off";
        $("conn").textContent = "SSE off";
        // EventSource auto-reconnects; no manual retry needed.
      });
      es.addEventListener("match", (ev) => {
        try { renderMatch(JSON.parse(ev.data)); }
        catch (e) { log(`bad match payload: ${e.message}`, true); }
      });
    }

    loadUsers().catch(e => log(`load failed: ${e.message}`, true));
    connectSSE();
    connectDeviceMessages();   // route firmware NFC taps into doTap()
    connectUI();               // wire up the "Connect Device" button (device.js)
  </script>
</body>
</html>
